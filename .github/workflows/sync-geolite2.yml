name: Sync GeoLite2 Databases

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download GeoIP Legacy databases from mailfud.org (v1)
        run: |
          BASE="https://mailfud.org/geoip-legacy"
          mkdir -p v1
          curl -fsSL "$BASE/GeoIP.dat.gz"        -o v1/GeoIP.dat.gz
          curl -fsSL "$BASE/GeoIPv6.dat.gz"      -o v1/GeoIPv6.dat.gz
          curl -fsSL "$BASE/GeoIPCity.dat.gz"    -o v1/GeoIPCity.dat.gz
          curl -fsSL "$BASE/GeoIPCityv6.dat.gz"  -o v1/GeoIPCityv6.dat.gz
          curl -fsSL "$BASE/GeoIPASNum.dat.gz"   -o v1/GeoIPASNum.dat.gz
          curl -fsSL "$BASE/GeoIPASNumv6.dat.gz" -o v1/GeoIPASNumv6.dat.gz
          curl -fsSL "$BASE/GeoIPISP.dat.gz"     -o v1/GeoIPISP.dat.gz
          curl -fsSL "$BASE/GeoIPISPv6.dat.gz"   -o v1/GeoIPISPv6.dat.gz
          curl -fsSL "$BASE/GeoIPOrg.dat.gz"     -o v1/GeoIPOrg.dat.gz
          curl -fsSL "$BASE/GeoIPOrgv6.dat.gz"   -o v1/GeoIPOrgv6.dat.gz

      - name: Download GeoLite2 databases from P3TERX (v2)
        run: |
          BASE="https://github.com/P3TERX/GeoLite.mmdb/releases/latest/download"
          mkdir -p v2
          curl -fsSL "$BASE/GeoLite2-ASN.mmdb"     -o v2/GeoLite2-ASN.mmdb
          curl -fsSL "$BASE/GeoLite2-City.mmdb"    -o v2/GeoLite2-City.mmdb
          curl -fsSL "$BASE/GeoLite2-Country.mmdb" -o v2/GeoLite2-Country.mmdb

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add v1/ v2/
          if git diff --cached --quiet; then
            echo "No changes detected, skipping commit."
          else
            git commit -m "chore: sync GeoIP databases [$(date -u +%Y-%m-%d)]"
            git push
          fi
