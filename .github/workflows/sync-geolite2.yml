name: Sync GeoIP Databases

on:
  schedule:
    - cron: '13 20 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download GeoIP Legacy databases from mailfud.org (v1)
        run: |
          BASE="https://mailfud.org/geoip-legacy"
          mkdir -p tmp/v1 v1

          FILES=(
            GeoIP.dat.gz        GeoIPv6.dat.gz
            GeoIPCity.dat.gz    GeoIPCityv6.dat.gz
            GeoIPASNum.dat.gz   GeoIPASNumv6.dat.gz
            GeoIPISP.dat.gz     GeoIPISPv6.dat.gz
            GeoIPOrg.dat.gz     GeoIPOrgv6.dat.gz
          )

          for f in "${FILES[@]}"; do
            echo ":: Downloading $f"
            curl -fsSL --retry 3 --retry-delay 5 --retry-all-errors --max-time 120 \
              "$BASE/$f" -o "tmp/v1/$f"

            gzip -t "tmp/v1/$f" \
              || { echo "ERROR: $f failed gzip integrity check"; exit 1; }

            SIZE=$(stat -c%s "tmp/v1/$f")
            [ "$SIZE" -lt 50000 ] \
              && { echo "ERROR: $f is suspiciously small (${SIZE} bytes)"; exit 1; }

            echo "OK: $f (${SIZE} bytes)"
          done

          mv tmp/v1/* v1/

      - name: Download GeoLite2 databases from P3TERX (v2)
        run: |
          BASE="https://github.com/P3TERX/GeoLite.mmdb/releases/latest/download"
          mkdir -p tmp/v2 v2

          FILES=(GeoLite2-ASN.mmdb GeoLite2-City.mmdb GeoLite2-Country.mmdb)

          for f in "${FILES[@]}"; do
            echo ":: Downloading $f"
            curl -fsSL --retry 3 --retry-delay 5 --retry-all-errors --max-time 120 \
              "$BASE/$f" -o "tmp/v2/$f"

            python3 - "tmp/v2/$f" <<'EOF'
          import sys
          path = sys.argv[1]
          with open(path, 'rb') as fh:
              content = fh.read()
          if b'MaxMind.com' not in content[-512:]:
              print(f"ERROR: {path} is not a valid MMDB file (missing MaxMind metadata)")
              sys.exit(1)
          EOF

            SIZE=$(stat -c%s "tmp/v2/$f")
            [ "$SIZE" -lt 1000000 ] \
              && { echo "ERROR: $f is suspiciously small (${SIZE} bytes)"; exit 1; }

            echo "OK: $f (${SIZE} bytes)"
          done

          mv tmp/v2/* v2/

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add v1/ v2/
          if git diff --cached --quiet; then
            echo "No changes detected, skipping commit."
          else
            git commit -m "chore: sync GeoIP databases [$(date -u +%Y-%m-%d)]"
            git push
          fi
